services:
  db:
    image: postgres:16-alpine
    container_name: users-api-db
    environment:
      POSTGRES_USER: api
      POSTGRES_PASSWORD: api
      POSTGRES_DB: api
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api -d api"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ./app
    container_name: users-api-app
    ports:
      - "3000:3000"
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGUSER: api
      PGPASSWORD: api
      PGDATABASE: api
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
